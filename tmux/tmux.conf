# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Vim-style keys (h, j, k, l) with the prefix to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Context-aware splits: open new panes in the same directory
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Better copy/paste (Vim style)
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# Quality of Life Tweaks
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-option -g detach-on-destroy off
setw -g history-limit 50000

# Quick reload of tmux settings
unbind r
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux config'

# --- Smart pane switching with awareness of Vim splits ---
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# --- Added from colleague's config ---
bind -n S-Left  previous-window
bind -n S-Right next-window
bind a set-window-option synchronize-panes
bind e new-window -n '~/.tmux.conf' "sh -c 'nvim ~/.tmux.conf && tmux source ~/.tmux.conf'"
bind-key / copy-mode \; send-key ?

# --- 🎨 Status Bar Aesthetics (Colleague's Style) ---
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 150
set-option -g status "on"

# Colors
set-option -g status-style bg=colour237,fg=colour223
set-window-option -g window-status-style bg=colour214,fg=colour237
set-window-option -g window-status-current-style bg=red,fg=colour237
set-option -g pane-active-border-style fg=colour214
set-option -g pane-border-style fg=colour239

# Layout
set-option -g status-left "#[fg=colour7, bg=colour241]#{?client_prefix,#[bg=colour167],} ❐ #S #[fg=colour241, bg=colour237]#{?client_prefix,#[fg=colour167],}#{?window_zoomed_flag, 🔍,} "
set-option -g status-right "#[fg=colour246, bg=colour237]  %b %d '%y #[fg=colour109]  %H:%M #[fg=colour248, bg=colour239]"

set-window-option -g window-status-current-format "#[fg=colour237, bg=colour214]#[fg=colour239, bg=colour214] #I* #[fg=colour239, bg=colour214, bold] #W #[fg=colour214, bg=colour237]"
set-window-option -g window-status-format "#[fg=colour237,bg=colour239,noitalics]#[fg=colour223,bg=colour239] #I #[fg=colour223, bg=colour239] #W #[fg=colour239, bg=colour237]"
